{% extends "core/base.html" %}
{% block content %}
<div class="auth-card mx-auto">
    <h2>Create Account</h2>
    <form method="post" action="{% url 'signup' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" id="id_username" class="form-control-dark form-control" placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
            <label for="id_email" class="form-label">Email Address</label>
            <input type="email" name="email" id="id_email" class="form-control-dark form-control" placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" name="password" id="id_password" class="form-control-dark form-control" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn-accent mt-3">Send OTP</button>
    </form>

    <div class="text-center mt-4">
        <p class="mb-0" style="color: #bfbfbf; font-size: 0.9rem;">
            Already have an account? 
            <a href="{% url 'login' %}" class="login-link">Login Here</a>
        </p>
    </div>
</div>

<style>
.auth-card {
    width: 420px;
    max-width: 90%;
    margin: 0 auto;
    background-color: #1e1e1e;
    border-radius: 12px;
    padding: 2.5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    text-align: left;
    border-top: 5px solid #00bcd4; /* Teal Accent */
}
.auth-card h2 {
    text-align: center;
    font-weight: 700;
    color: #e0e0e0;
    margin-bottom: 1.5rem;
}
.auth-card label {
    color: #bfbfbf;
    font-weight: 500;
}
.form-control-dark {
    width: 100%;
    background-color: #121212;
    border: 1px solid #333;
    color: #e0e0e0;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-top: 0.5rem;
}
.form-control-dark:focus {
    border-color: #00bcd4;
    box-shadow: 0 0 15px rgba(0,188,212,0.3);
    outline: none;
}
.btn-accent {
    display: block;
    width: 100%;
    background-color: #00bcd4;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.75rem;
    font-size: 1rem;
    font-weight: 600;
    transition: 0.2s;
}
.btn-accent:hover {
    background-color: #0097a7;
    box-shadow: 0 0 20px rgba(0,188,212,0.4);
}
.login-link {
    color: #00bcd4;
    text-decoration: none;
    font-weight: 600;
    margin-left: 5px;
}
.login-link:hover {
    text-decoration: underline;
}
</style>
{% endblock %}
