{% extends "core/base.html" %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card auth-card-compact mx-auto">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if 'success' in message.tags %}alert-success{% elif 'error' in message.tags or 'danger' in message.tags %}alert-danger{% else %}alert-warning{% endif %} py-2" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="auth-header">
            <h2 class="auth-title">Forgot Password</h2>
            <p class="auth-subtitle">Enter your username or email to receive a password reset OTP.</p>
        </div>

        <form method="post" action="{% url 'forgot_password' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_identifier" class="form-label auth-label">Username / Email</label>
                <input type="text" name="identifier" id="id_identifier" class="form-control-dark form-control" placeholder="Enter username or email" required>
            </div>
            <button type="submit" class="btn btn-accent auth-submit">Send Reset OTP</button>
        </form>

        <div class="text-center mt-4 pt-1">
            <p class="mb-0" style="color: #bfbfbf; font-size: 0.95rem;">
                Remembered password?
                <a href="{% url 'login' %}" class="auth-link ms-1">Login Here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
