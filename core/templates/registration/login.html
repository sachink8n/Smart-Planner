{% extends "core/base.html" %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card auth-card-compact mx-auto">
        <div class="auth-header">
            <h2 class="auth-title">Welcome Back</h2>
        </div>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label auth-label">Username</label>
                <input type="text" name="username" id="id_username" class="form-control-dark form-control" placeholder="Enter your username" required>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label auth-label">Password</label>
                <input type="password" name="password" id="id_password" class="form-control-dark form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-accent auth-submit">Login</button>
        </form>

        <div class="text-center mt-4 pt-1">
            <p class="mb-0" style="color: #bfbfbf; font-size: 0.95rem;">
                Don't have an account?
                <a href="{% url 'signup' %}" class="auth-link ms-1">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
