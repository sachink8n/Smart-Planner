{% extends "core/base.html" %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card mx-auto">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if 'success' in message.tags %}alert-success{% elif 'error' in message.tags or 'danger' in message.tags %}alert-danger{% else %}alert-warning{% endif %} py-2" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-key fa-2x text-info"></i>
            </div>
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle">
                Enter the OTP sent to:<br>
                <span>{{ request.session.temp_email }}</span>
            </p>
        </div>

        <form method="post" action="{% url 'forgot_password_verify' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_otp" class="form-label auth-label">OTP</label>
                <input type="text" name="otp" id="id_otp" class="form-control form-control-lg otp-input-glow" placeholder="· · · · · ·" maxlength="6" required inputmode="numeric" autocomplete="off">
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label auth-label">New Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="id_password" class="form-control-dark form-control" placeholder="Create new password" required>
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="id_password" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <label for="id_confirm_password" class="form-label auth-label">Confirm Password</label>
                <div class="input-group">
                    <input type="password" name="confirm_password" id="id_confirm_password" class="form-control-dark form-control" placeholder="Confirm new password" required>
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="id_confirm_password" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-accent auth-submit">Reset Password</button>
        </form>

        <div class="auth-meta">
            <p class="small mb-1">Didn't receive the email?</p>
            <form method="POST" action="{% url 'resend_otp' %}" class="mt-1">
                {% csrf_token %}
                <button type="submit" class="btn btn-link text-info p-0 fw-bold" style="text-decoration: none;">Resend OTP Now</button>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.password-toggle').forEach(function (btn) {
        btn.addEventListener('click', function () {
            const input = document.getElementById(btn.dataset.target);
            const icon = btn.querySelector('i');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            icon.classList.toggle('fa-eye', !isPassword);
            icon.classList.toggle('fa-eye-slash', isPassword);
        });
    });
});
</script>
{% endblock %}
