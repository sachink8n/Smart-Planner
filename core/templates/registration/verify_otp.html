{% extends 'core/base.html' %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card mx-auto">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-envelope-open-text fa-2x text-info"></i>
            </div>
            <h2 class="auth-title">Verify Your Email</h2>
            <p class="auth-subtitle">
                We have sent a 6-digit verification code to:<br>
                <span>{{ request.session.temp_email }}</span>
            </p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label auth-label small d-block text-center mb-3">ENTER SECURITY CODE</label>
                <input type="text" name="otp" class="form-control form-control-lg otp-input-glow"
                       placeholder="· · · · · ·" maxlength="6" required autofocus autocomplete="off" inputmode="numeric">
            </div>

            <button type="submit" class="btn btn-accent auth-submit">VERIFY AND ACTIVATE</button>
        </form>

        <div class="auth-meta">
            <p class="small mb-1">Didn't receive the email?</p>
            <div id="resend-timer" class="text-info">
                You can request a new code in <span id="seconds" class="fw-bold">60</span>s
            </div>
            <a href="#" id="resend-btn" class="btn btn-link text-info d-none p-0 fw-bold" style="text-decoration: none;">Resend OTP Now</a>
        </div>
    </div>
</div>

<script>
    let timeLeft = 60;
    const timerDisplay = document.getElementById('seconds');
    const timerBox = document.getElementById('resend-timer');
    const resendBtn = document.getElementById('resend-btn');

    let countdown = setInterval(function() {
        timeLeft--;
        timerDisplay.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerBox.classList.add('d-none');
            resendBtn.classList.remove('d-none');
        }
    }, 1000);
</script>
{% endblock %}
