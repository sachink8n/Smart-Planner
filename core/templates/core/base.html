<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Planner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        tailwind = {
            config: {
                corePlugins: {
                    preflight: false,
                },
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root{
            --bg-dark:#121212;
            --card-dark:#1e1e1e;
            --card-darker:#141414;
            --border-dark:#2e2e2e;
            --text-primary:#e6e6e6;
            --text-secondary:#9a9a9a;
            --accent-color:#00bcd4;
            --accent-hover:#0097a7;
            --btn-success:#4caf50;
            --btn-danger:#f44336;
            --btn-warning: #f1c40f;
            --muted:#6f6f6f;
        }

        body{
            background-color:var(--bg-dark);
            color:var(--text-primary);
            font-family:'Inter',sans-serif;
            padding-top:2rem;
            padding-bottom:4rem;
        }
        
        .main-title {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-shell {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-shell-narrow {
            max-width: 860px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .page-header-title {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            margin: 0;
            min-width: 0;
        }

        .page-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            width: 100%;
        }

        .page-actions > * {
            min-width: 0;
        }

        .mobile-stack-card {
            background-color: var(--card-dark);
            border: 1px solid var(--border-dark);
            border-radius: 18px;
            padding: 1.1rem;
            box-shadow: 0 16px 34px rgba(0,0,0,0.24);
        }

        .subtle-back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .subtle-back-link:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.24);
            background: rgba(255,255,255,0.08);
        }

        /* --- NAVBAR (FIXED) --- */
        .navbar{
            background-color: transparent !important;
            padding-top:0.5rem;
            padding-bottom: 2.5rem;
            position: relative;
        }
        .navbar-brand{
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-primary) !important;
            font-weight: 800;
            font-size: 2.4rem;
            letter-spacing: -0.02em;
            margin: 0;
            text-align: center;
            padding: 0.25rem 0;
        }
        .nav-hamburger {
            margin-left: auto;
            z-index: 1051;
            transition: opacity 0.2s; /* Smooth transition */
        }
        .nav-hamburger .btn {
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-primary) !important;
            background: rgba(255,255,255,0.05);
            padding: 0.5rem 0.75rem;
        }
        .nav-hamburger .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }
        .nav-hamburger .btn .fas {
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        /* --- OFFCANVAS (MENU) --- */
        .offcanvas {
            background: linear-gradient(180deg, var(--card-dark), var(--card-darker));
            color: var(--text-primary);
        }
        .offcanvas .offcanvas-header {
            border-bottom: none;
        }
        .offcanvas .offcanvas-title {
            color: var(--text-primary);
            font-weight:700;
        }
        .offcanvas .btn-close {
            filter: invert(1) brightness(1.5);
            opacity: 0.8;
        }
        .offcanvas .list-group-item {
            background: transparent;
            color: var(--text-primary) !important;
            border: none;
            padding: 0.9rem 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .offcanvas .list-group-item:first-child { 
            border-top: none;
        }
        .offcanvas .list-group-item .fa,
        .offcanvas .list-group-item .fas {
            color: var(--text-primary) !important;
            opacity: 0.95;
            width: 22px;
            text-align: center;
        }
        .offcanvas .list-group-item span {
            color: var(--text-primary) !important;
            margin-left: 0.5rem;
        }
        .offcanvas .list-group-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .offcanvas .list-group-item:hover .fa,
        .offcanvas .list-group-item:hover .fas,
        .offcanvas .list-group-item:hover span {
            color: var(--accent-color) !important;
        }
        .offcanvas .btn-logout {
            border: 1px solid rgba(244,67,54,0.3);
            color: var(--btn-danger) !important;
            background: transparent;
            font-weight: 500;
        }
        .offcanvas .btn-logout:hover {
            background: rgba(244,67,54,0.15);
            color: #ff5252 !important;
            border-color: rgba(244,67,54,0.5);
        }
        .offcanvas .btn-logout .fas {
            color: var(--btn-danger) !important;
        }
        .offcanvas .btn-outline-light {
            color: var(--text-primary) !important;
            border-color: rgba(255,255,255,0.2) !important;
            background: rgba(255,255,255,0.05);
        }
        .offcanvas .btn-outline-light:hover {
            background: rgba(255,255,255,0.1) !important;
            border-color: rgba(255,255,255,0.3) !important;
            color: #fff !important;
        }

        /* --- CARDS (Form, Task, etc.) --- */
        .form-card, .task-card {
            background-color: var(--card-dark);
            padding: 1.75rem;
            border-radius: 12px;
            border: 1px solid var(--border-dark);
            margin-bottom: 1.5rem;
        }
        .task-card {
            border-left: 4px solid var(--accent-color);
        }
        .task-card.Easy { border-left-color: var(--btn-success); }
        .task-card.Moderate { border-left-color: var(--btn-warning); }
        .task-card.Hard { border-left-color: var(--btn-danger); }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .task-title {
            font-weight: 600;
            color: var(--text-primary);
        }
        .task-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            margin-left: 1rem;
        }

        /* --- BUTTONS --- */
        .btn-accent {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #000 !important;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-accent:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        .btn-outline-secondary {
            border-color: var(--border-dark) !important;
            color: var(--text-secondary) !important;
        }
        .btn-outline-secondary:hover {
            background-color: rgba(255,255,255,0.05) !important;
            border-color: var(--text-secondary) !important;
            color: var(--text-primary) !important;
        }
        .btn-action {
            font-weight: 500;
            border-radius: 8px;
            padding: 0.6rem 1rem;
        }
        .btn-complete {
            background-color: var(--btn-success);
            border-color: var(--btn-success);
            color: #fff !important;
        }
        .btn-outline-warning {
            border-color: var(--btn-warning) !important;
            color: var(--btn-warning) !important;
        }
        .btn-outline-warning:hover {
            background-color: var(--btn-warning) !important;
            color: #000 !important;
        }
        .btn-delete {
            background-color: var(--btn-danger);
            border-color: var(--btn-danger);
            color: #fff !important;
        }
        .btn-outline-success { color: var(--btn-success) !important; border-color: var(--btn-success) !important; }
        .btn-outline-success:hover { background-color: var(--btn-success) !important; color: #fff !important; }
        .btn-outline-danger { color: var(--btn-danger) !important; border-color: var(--btn-danger) !important; }
        .btn-outline-danger:hover { background-color: var(--btn-danger) !important; color: #fff !important; }
        .btn-outline-info { color: var(--accent-color) !important; border-color: var(--accent-color) !important; }
        .btn-outline-info:hover { background-color: var(--accent-color) !important; color: #000 !important; }

        /* --- FORMS (FIXED) --- */
        .form-control-dark::placeholder,
        textarea::placeholder {
            color: var(--text-secondary) !important;
            opacity: 0.7;
        }
        input.form-control-dark, 
        textarea.form-control-dark {
            background: var(--card-darker) !important;
            color: var(--text-primary) !important;
            border-color: rgba(255,255,255,0.1) !important;
        }
        select.form-select {
            background-color: var(--card-darker) !important;
            color: var(--text-primary) !important;
            border-color: rgba(255,255,255,0.1) !important;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%239a9a9a' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
            background-repeat: no-repeat !important;
            background-position: right 0.75rem center !important;
            background-size: 16px 12px !important;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        input.form-control-dark:focus, 
        textarea.form-control-dark:focus,
        select.form-select:focus {
            background: var(--card-dark) !important;
            color: var(--text-primary) !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 0 0.2rem rgba(0, 188, 212, 0.25) !important;
        }

        /* --- SUB-TASK STEPS LIST (Green Checkmark) --- */
        .steps-list {
            list-style: none;
            padding-left: 0;
            margin-top: 1.5rem;
            text-align: left;
        }
        .steps-list li {
            position: relative;
            padding-left: 1.8em; 
            text-indent: -1.8em; 
            color: var(--text-primary); 
            margin-bottom: 0.75rem; 
            line-height: 1.6;
        }
        .steps-list li::before {
            content: '✓'; 
            color: var(--btn-success); 
            font-weight: bold;
            margin-right: 0.7em;
            position: absolute;
            left: 0;
            top: 0;
        }

        /* --- Difficulty Badges --- */
        .badge-difficulty {
            display:inline-block;
            font-weight:700;
            padding: 0.28rem 0.6rem;
            border-radius: 14px;
            font-size:0.82rem;
            border:1px solid transparent;
            margin-right:0.5rem;
        }
        .badge-difficulty.Easy { background:#2ecc71; border-color:#27ae60; color:#05280f; }
        .badge-difficulty.Moderate { background:#f1c40f; border-color:#d4ac0d; color:#2e2a00; }
        .badge-difficulty.Hard { background:#e74c3c; border-color:#c0392b; color:#2b0700; }
        
        .badge-category {
            background-color: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-weight: 500;
            padding: 0.3em 0.6em;
            border-radius: 6px;
        }

        .auth-page {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(0, 188, 212, 0.12), transparent 30%),
                linear-gradient(180deg, #090909 0%, #0f0f0f 45%, #121212 100%);
        }
        .auth-page .container {
            max-width: 1180px;
        }
        .auth-page main{
            display:flex;
            align-items:center;
            justify-content:center;
            min-height: calc(100vh - 140px);
            padding: 1rem 0 2rem;
        }
        .auth-shell {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }
        .auth-card {
            width: 100%;
            background: linear-gradient(180deg, rgba(30,30,30,0.96), rgba(22,22,22,0.98));
            border: 1px solid rgba(255,255,255,0.08);
            border-top: 5px solid var(--accent-color);
            border-radius: 24px;
            padding: 2.2rem;
            box-shadow: 0 24px 60px rgba(0,0,0,0.42);
            text-align: left;
        }
        .auth-card.auth-card-compact {
            max-width: 440px;
            margin: 0 auto;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .auth-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 188, 212, 0.12);
            box-shadow: inset 0 0 18px rgba(0, 188, 212, 0.08);
        }
        .auth-title {
            margin: 0;
            color: var(--text-primary);
            font-size: clamp(2rem, 3vw, 2.35rem);
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        .auth-subtitle {
            margin: 0.9rem 0 0;
            color: var(--text-secondary);
            font-size: 0.98rem;
            line-height: 1.65;
        }
        .auth-subtitle strong,
        .auth-subtitle span {
            color: var(--accent-color);
            font-weight: 700;
            word-break: break-word;
        }
        .auth-label {
            color: #bfbfbf;
            font-weight: 500;
            margin-bottom: 0.45rem;
        }
        .auth-submit {
            display: block;
            width: 100%;
            min-height: 54px;
            margin-top: 0.5rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            box-shadow: 0 10px 28px rgba(0, 188, 212, 0.28);
        }
        .auth-submit:hover {
            box-shadow: 0 14px 34px rgba(0, 188, 212, 0.34);
            transform: translateY(-1px);
        }
        .auth-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
        .auth-card .alert {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .auth-card .input-group .form-control {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .password-toggle {
            border-color: rgba(255, 255, 255, 0.12) !important;
            color: var(--text-secondary) !important;
            background: var(--card-darker) !important;
            min-width: 48px;
        }
        .password-toggle:hover,
        .password-toggle:focus {
            color: var(--accent-color) !important;
            border-color: rgba(0, 188, 212, 0.45) !important;
            box-shadow: none !important;
            background: var(--card-darker) !important;
        }
        .otp-input-glow {
            min-height: 74px;
            border-radius: 16px;
            border: 2px solid rgba(0, 188, 212, 0.75) !important;
            background: #101010 !important;
            color: var(--accent-color) !important;
            text-align: center;
            font-weight: 800;
            font-size: clamp(1.6rem, 3.8vw, 2.2rem) !important;
            letter-spacing: clamp(0.55rem, 1.8vw, 1rem);
            padding: 0.75rem 1rem !important;
            box-shadow: 0 0 24px rgba(0, 188, 212, 0.22);
        }
        .otp-input-glow::placeholder {
            color: rgba(255,255,255,0.18) !important;
            letter-spacing: clamp(0.55rem, 1.8vw, 1rem);
        }
        .otp-input-glow:focus {
            box-shadow: 0 0 0 0.2rem rgba(0, 188, 212, 0.18), 0 0 32px rgba(0, 188, 212, 0.25) !important;
        }
        .auth-meta {
            margin-top: 1.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }
        .auth-meta p,
        .auth-meta div {
            color: var(--text-secondary);
        }

        /* ---- PREVENT HORIZONTAL OVERFLOW ON ALL SCREENS ---- */
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* ---- MOBILE-FIRST: HEADER STACKING ---- */
        /* Any d-flex justify-content-between header that should stack on mobile */
        .mobile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .mobile-header .main-title {
            margin: 0;
        }
        .mobile-header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        @media (max-width: 991px) {
            .navbar-brand {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 767px) {
            html, body {
                overflow-x: hidden;
            }
            body {
                padding-top: 0.75rem;
                padding-bottom: 2.25rem;
            }
            .container {
                padding-left: 12px;
                padding-right: 12px;
            }
            .navbar {
                padding-bottom: 1rem;
            }
            .navbar .container-fluid {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .navbar-brand {
                position: static;
                transform: none;
                font-size: 1.35rem;
                margin: 0;
                text-align: left;
                line-height: 1.1;
                flex: 1;
            }

            /* --- Force Bootstrap cols to full width on mobile --- */
            .row > [class*="col-md"],
            .row > [class*="col-lg"] {
                width: 100% !important;
                max-width: 100% !important;
                flex: 0 0 100% !important;
                padding-left: 0 !important;
                padding-right: 0 !important;
            }

            /* --- Cards --- */
            .form-card, .task-card {
                padding: 1rem;
                border-radius: 14px;
            }

            /* --- Task Header --- */
            .task-header {
                flex-direction: column;
                gap: 0.5rem;
            }
            .task-title {
                font-size: 1rem !important;
                word-break: break-word;
            }
            .task-date {
                margin-left: 0 !important;
            }

            /* --- Timer --- */
            #timer-display {
                font-size: 3rem !important;
            }

            /* --- List group items --- */
            .list-group-item {
                padding: 0.85rem 0.75rem !important;
            }
            .list-group-item .d-flex {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .list-group-item.d-flex {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 0.65rem;
            }

            /* --- Badges --- */
            .d-flex.gap-2 {
                flex-wrap: wrap;
            }

            /* --- Buttons: touch-friendly --- */
            .btn {
                min-height: 44px;
                font-size: 0.9rem;
                padding: 0.55rem 0.85rem;
            }
            .subtle-back-link {
                min-height: 44px;
            }

            /* --- Mobile header stacking --- */
            .mobile-header {
                flex-direction: column;
                align-items: stretch;
            }
            .mobile-header-actions {
                flex-direction: column;
            }
            .mobile-header-actions .btn {
                width: 100%;
            }
            /* Stack mobile-header only (not ALL d-flex containers) */
            .mobile-header-actions .btn {
                width: 100%;
            }

            /* --- AI steps --- */
            .ai-step-card {
                padding: 12px 14px;
                font-size: 0.9rem;
            }

            /* --- Page shell --- */
            .page-shell {
                padding-left: 4px;
                padding-right: 4px;
            }
            .page-header {
                align-items: stretch;
                margin-bottom: 1.1rem;
            }
            .page-header-title {
                width: 100%;
                justify-content: flex-start;
                font-size: 1.1rem;
            }
            .page-actions {
                grid-template-columns: 1fr;
            }

            /* --- Mobile stack card --- */
            .mobile-stack-card {
                padding: 1rem;
            }

            /* --- Auth pages --- */
            .auth-page main {
                align-items: flex-start;
                min-height: auto;
                padding-top: 0.75rem;
            }
            .auth-card {
                padding: 1.35rem;
                border-radius: 18px;
            }
            .auth-card.auth-card-compact {
                max-width: none;
            }
            .auth-header {
                margin-bottom: 1.35rem;
            }
            .auth-icon {
                width: 60px;
                height: 60px;
                margin-bottom: 0.85rem;
            }
            .auth-submit {
                min-height: 50px;
                font-size: 0.96rem;
            }

            /* --- OTP --- */
            .otp-input-glow {
                min-height: 64px;
                letter-spacing: 0.42rem;
                padding-left: 0.85rem !important;
                padding-right: 0.85rem !important;
            }
            .otp-input-glow::placeholder {
                letter-spacing: 0.42rem;
            }

            /* --- Two-column content (team dashboard etc) stacks --- */
            .row > .col-md-8,
            .row > .col-md-4 {
                width: 100% !important;
                max-width: 100% !important;
                flex: 0 0 100% !important;
                padding-left: 0 !important;
                padding-right: 0 !important;
            }

            /* --- View study plan: steps list & day form --- */
            .d-flex.flex-column.align-items-end.gap-2 {
                align-items: stretch !important;
            }
            .d-flex.flex-column.align-items-end.gap-2 .d-flex.gap-2 {
                flex-direction: column;
            }
            .d-flex.flex-column.align-items-end.gap-2 .d-flex.gap-2 input[type="date"] {
                width: 100% !important;
            }

            /* --- Input groups on mobile (NOT password toggle groups) --- */
            .input-group:not(.auth-card .input-group) {
                flex-direction: column;
            }
            .input-group:not(.auth-card .input-group) .form-control {
                border-radius: 12px !important;
                margin-bottom: 0.5rem;
            }
            .input-group:not(.auth-card .input-group) .btn {
                border-radius: 12px !important;
                width: 100%;
                margin-left: 0 !important;
            }
            /* Auth password field: keep inline row */
            .auth-card .input-group {
                flex-direction: row !important;
                flex-wrap: nowrap !important;
            }
            .auth-card .input-group .form-control {
                border-top-right-radius: 0 !important;
                border-bottom-right-radius: 0 !important;
                margin-bottom: 0 !important;
                flex: 1 1 auto;
            }
            .auth-card .input-group .password-toggle {
                border-top-left-radius: 0 !important;
                border-bottom-left-radius: 0 !important;
                width: auto !important;
                min-width: 48px;
                flex: 0 0 auto;
            }

            /* --- Steps list --- */
            .steps-list li {
                font-size: 0.92rem;
                line-height: 1.5;
                word-break: break-word;
            }
        }

        /* ---- VERY SMALL PHONES (< 420px) ---- */
        @media (max-width: 420px) {
            .container {
                padding-left: 8px;
                padding-right: 8px;
            }
            .nav-hamburger .btn {
                padding: 0.45rem 0.65rem;
            }
            .navbar-brand {
                font-size: 1.25rem;
            }
            .form-card, .task-card {
                padding: 0.85rem;
            }
            .mobile-stack-card {
                padding: 0.85rem;
                border-radius: 16px;
            }
            #timer-display {
                font-size: 2.5rem !important;
            }
            .auth-card {
                padding: 1.1rem;
            }
            .auth-title {
                font-size: 1.65rem;
            }
            .auth-subtitle {
                font-size: 0.9rem;
            }
            .otp-input-glow {
                letter-spacing: 0.28rem;
                font-size: 1.35rem !important;
            }
            .otp-input-glow::placeholder {
                letter-spacing: 0.28rem;
            }
            /* Smaller text for cards */
            .main-title {
                font-size: 1.25rem !important;
            }
            h3 {
                font-size: 1.1rem;
            }
            h5 {
                font-size: 1rem;
            }
            .badge-icon {
                font-size: 2.2rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body {% if not user.is_authenticated %}class="auth-page"{% endif %}>
    
    <div class="container">
        <nav class="navbar">
            <div class="container-fluid p-0 d-flex align-items-center">
                <a class="navbar-brand" href="{% url 'personal_dashboard' %}">Smart Planner</a>

                <div class="nav-hamburger" id="hamburgerWrapper">
                    <button class="btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-label="Open menu">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </nav>

        <div class="offcanvas offcanvas-end" tabindex="-1" id="mainMenu" aria-labelledby="mainMenuLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="mainMenuLabel">Menu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>

            <div class="offcanvas-body">
                {% if user.is_authenticated %}
                    <p class="text-secondary small mb-3">Welcome, {{ user.username }}</p>

                    <div class="list-group list-group-flush">
                        <a href="{% url 'personal_dashboard' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                            <i class="fas fa-home"></i>
                            <span>Dashboard</span>
                        </a>
                        <a href="{% url 'profile' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                            <i class="fas fa-user-circle"></i>
                            <span>Profile</span>
                        </a>
                        <a href="{% url 'create_study_plan' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Create Plan</span>
                        </a>
                        <a href="{% url 'plan_list' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                            <i class="fas fa-list-alt"></i>
                            <span>My Plans</span>
                        </a>
                        <a href="{% url 'kanban_board' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                            <i class="fas fa-columns"></i>
                            <span>Workflow Board</span>
                        </a>
                        <a href="{% url 'task_history' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                            <i class="fas fa-history"></i>
                            <span>History</span>
                        </a>
                        <a href="{% url 'team_list' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                            <i class="fas fa-users"></i>
                            <span>Teams</span>
                        </a>
                        <div class="list-group-item bg-transparent mt-3">
                            <form action="{% url 'logout' %}" method="POST" class="d-inline w-100">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-logout w-100 d-flex align-items-center justify-content-center">
                                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                                </button>
                            </form>
                        </div>
                    </div>
                {% else %}
                    <div class="d-grid gap-2">
                        <a href="{% url 'login' %}" class="btn btn-outline-light">Login</a>
                    </div>
                {% endif %}
            </div>
        </div>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const myOffcanvas = document.getElementById('mainMenu');
        const hamburger = document.getElementById('hamburgerWrapper');
        
        myOffcanvas.addEventListener('show.bs.offcanvas', () => {
            hamburger.style.opacity = '0';
            hamburger.style.pointerEvents = 'none';
        });
        
        myOffcanvas.addEventListener('hidden.bs.offcanvas', () => {
            hamburger.style.opacity = '1';
            hamburger.style.pointerEvents = 'auto';
        });
    </script>
</body>
</html>
